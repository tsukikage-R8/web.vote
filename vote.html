<script>
const params = new URLSearchParams(location.search);
const type = params.get("type");

let options = [];

if(type === "class"){
options = [
"1J1","1J2","1J3","1J4","1J5",
"1K1","1K2",
"1S1","1S2","1SS",
"2J1","2J2","2J3","2J4","2J5",
"2K","2S","2SS",
"3J1","3J2","3J3","3J4","3J5",
"3K","3S1","3S2","3SS"
];
}else if(type === "sports"){
options = ["ダンス部","バスケ部"];
}else if(type === "culture"){
options = ["吹奏楽部","コーラス部","家庭科部"];
}

const select = document.querySelector("select");

options.forEach(o=>{
const opt = document.createElement("option");
opt.value = o;
opt.textContent = o;
select.appendChild(opt);
});

// 👇ここ重要：送信しない
document.getElementById("form").addEventListener("submit",(e)=>{
e.preventDefault();

const choice = e.target.choice.value;

location.href =
`confirm.html?type=${type}&choice=${encodeURIComponent(choice)}`;
});
</script>
