<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投票</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0b1026;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:420px;
background:rgba(255,255,255,0.08);
padding:24px;
border-radius:16px;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
background:linear-gradient(90deg,#4fc3ff,#7ee0ff);
color:white;
font-weight:bold;
cursor:pointer;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

.note{
font-size:12px;
opacity:0.7;
margin-top:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h1 id="title">投票</h1>

<form id="form">
<select id="choice" required>
<option value="">選択してください</option>
</select>

<button type="submit" id="submitBtn">確認へ</button>

<div class="note">
※各部門につき1回のみ投票できます
</div>

</form>

</div>

<script>
window.addEventListener("DOMContentLoaded", () => {

const params = new URLSearchParams(location.search);
const type = params.get("type");

const select = document.getElementById("choice");
const title = document.getElementById("title");
const submitBtn = document.getElementById("submitBtn");

let options = [];

/* タイトル & 選択肢 */
if(type === "class"){
title.innerText = "クラス企画投票";
options = [
"2J1","2J2","2J3","2J4","2J5",
"2K","2S","2SS",
"3J1","3J2","3J3","3J4","3J5",
"3K","3S1","3S2","3SS"
];

}else if(type === "sports"){
title.innerText = "運動部投票";
options = ["ダンス部","バスケ部"];

}else if(type === "culture"){
title.innerText = "文化部投票";
options = ["吹奏楽部","コーラス部","家庭科部"];
}

/* 選択肢生成 */
options.forEach(o=>{
const opt = document.createElement("option");
opt.value = o;
opt.textContent = o;
select.appendChild(opt);
});

/* 回数制限チェック */
const voteKey = "vote_limit_" + type;

if(localStorage.getItem(voteKey)){
submitBtn.disabled = true;

const warn = document.createElement("div");
warn.style.marginTop = "10px";
warn.style.fontSize = "13px";
warn.style.color = "#ffb3b3";
warn.innerText = "この部門はすでに投票済みです";
document.querySelector(".container").appendChild(warn);
}

/* 送信 */
document.getElementById("form").addEventListener("submit",(e)=>{
e.preventDefault();

const choice = select.value;

/* 2回目チェック */
if(localStorage.getItem(voteKey)){
alert("この部門は1回しか投票できません");
return;
}

/* 投票記録 */
localStorage.setItem(voteKey,"1");

/* confirmへ */
location.href =
`confirm.html?type=${type}&choice=${encodeURIComponent(choice)}`;

});

});
</script>

</body>
</html>
