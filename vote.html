<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投票</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0b1026;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:420px;
background:rgba(255,255,255,0.08);
padding:24px;
border-radius:16px;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
background:linear-gradient(90deg,#4fc3ff,#7ee0ff);
color:white;
font-weight:bold;
cursor:pointer;
}

button:disabled{
opacity:0.5;
}

.note{
font-size:12px;
opacity:.7;
margin-top:10px;
text-align:center;
}

.stop{
text-align:center;
color:#ffaaaa;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1 id="title">投票</h1>

<form id="form">
<select id="choice" required>
<option value="">選択してください</option>
</select>

<button type="submit" id="submitBtn">確認へ</button>

<div class="note" id="limitText"></div>
<div class="stop" id="stopText"></div>

</form>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbxj96B2mEf3HCNVW6pmKuXD31ShN-oYYe53RoAXwF_yg5H7IyoQfkobosDs4vIobo706Q/exec";

window.addEventListener("DOMContentLoaded", async () => {

const params = new URLSearchParams(location.search);
const type = params.get("type");

const select = document.getElementById("choice");
const title = document.getElementById("title");
const submitBtn = document.getElementById("submitBtn");
const limitText = document.getElementById("limitText");
const stopText = document.getElementById("stopText");

/* 設定取得 */
const res = await fetch(API + "?action=settings");
const settings = await res.json();

const LIMIT = Number(settings.limit);
const VERSION = settings.version;
const ENABLED = settings.enabled === true || settings.enabled === "TRUE";

/* 投票停止 */
if(!ENABLED){
submitBtn.disabled = true;
stopText.innerText = "現在投票受付は停止しています";
}

/* 回数表示 */
limitText.innerText = `※この部門は${LIMIT}回まで投票できます`;

/* 選択肢 */
let options = [];

if(type === "class"){
title.innerText = "クラス企画投票";
options = [
"2J1","2J2","2J3","2J4","2J5",
"2K","2S","2SS",
"3J1","3J2","3J3","3J4","3J5",
"3K","3S1","3S2","3SS"
];

}else if(type === "sports"){
title.innerText = "運動部投票";
options = ["ダンス部","バスケ部"];

}else if(type === "culture"){
title.innerText = "文化部投票";
options = ["吹奏楽部","コーラス部","家庭科部"];
}

/* 選択肢生成 */
options.forEach(o=>{
const opt = document.createElement("option");
opt.value = o;
opt.textContent = o;
select.appendChild(opt);
});

/* 回数キー */
const voteKey = `vote_${type}_v${VERSION}`;

let count = Number(localStorage.getItem(voteKey) || 0);

if(count >= LIMIT){
submitBtn.disabled = true;

const warn = document.createElement("div");
warn.style.marginTop = "10px";
warn.style.color = "#ffb3b3";
warn.innerText = "この部門は投票上限に達しています";
document.querySelector(".container").appendChild(warn);
}

/* 送信 */
document.getElementById("form").addEventListener("submit",(e)=>{
e.preventDefault();

if(!ENABLED){
alert("投票は停止しています");
return;
}

let count = Number(localStorage.getItem(voteKey) || 0);

if(count >= LIMIT){
alert(`この部門は${LIMIT}回まで投票できます`);
return;
}

localStorage.setItem(voteKey, count + 1);

const choice = select.value;

location.href =
`confirm.html?type=${type}&choice=${encodeURIComponent(choice)}`;

});

});
</script>

</body>
</html>
