<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0b1026;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.panel{
width:90%;
max-width:420px;
background:rgba(255,255,255,0.08);
padding:24px;
border-radius:16px;
}

h1{
margin-top:0;
text-align:center;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}

button{
background:linear-gradient(90deg,#4fc3ff,#7ee0ff);
color:white;
font-weight:bold;
cursor:pointer;
}

button.danger{
background:linear-gradient(90deg,#ff5c5c,#ff8a8a);
}

.row{
margin-top:20px;
}

label{
font-size:13px;
opacity:.8;
}
</style>

</head>
<body>

<div class="panel" id="login">

<h1>管理ログイン</h1>

<input type="password" id="pass" placeholder="パスワード">

<button onclick="login()">ログイン</button>

</div>


<div class="panel" id="control" style="display:none">

<h1>投票管理</h1>

<div class="row">
<label>回数制限（1人◯票）</label>
<input type="number" id="limit">
<button onclick="setLimit()">変更</button>
</div>

<div class="row">
<label>投票受付</label>
<button onclick="toggleEnabled()" id="enabledBtn"></button>
</div>

<div class="row">
<label>回数制限リセット</label>
<button onclick="resetVersion()">リセット</button>
</div>

<div class="row">
<label>投票データ削除</label>
<button class="danger" onclick="resetVotes()">全削除</button>
</div>

</div>


<script>

const PASS = "R8tsukikagewebdata1341";

const API =
"https://script.google.com/macros/s/AKfycbxj96B2mEf3HCNVW6pmKuXD31ShN-oYYe53RoAXwF_yg5H7IyoQfkobosDs4vIobo706Q/exec";

let settings = {};

/* ログイン */
function login(){

const pass = document.getElementById("pass").value;

if(pass !== PASS){
alert("パスワードが違います");
return;
}

document.getElementById("login").style.display="none";
document.getElementById("control").style.display="block";

loadSettings();

}


/* 設定読み込み */
async function loadSettings(){

const res = await fetch(API + "?action=settings");
settings = await res.json();

document.getElementById("limit").value = settings.limit;

updateEnabledBtn();

}


/* 回数変更 */
async function setLimit(){

const value = document.getElementById("limit").value;

await fetch(API + `?action=set&key=limit&value=${value}`);

alert("回数制限変更しました");

}


/* 受付ON/OFF */
async function toggleEnabled(){

const newVal = settings.enabled === true || settings.enabled === "TRUE" ? false : true;

await fetch(API + `?action=set&key=enabled&value=${newVal}`);

settings.enabled = newVal;

updateEnabledBtn();

}


/* ボタン表示 */
function updateEnabledBtn(){

const btn = document.getElementById("enabledBtn");

if(settings.enabled === true || settings.enabled === "TRUE"){
btn.innerText = "受付中（クリックで停止）";
}else{
btn.innerText = "停止中（クリックで受付）";
}

}


/* 回数リセット */
async function resetVersion(){

const newVer = Number(settings.version) + 1;

await fetch(API + `?action=set&key=version&value=${newVer}`);

settings.version = newVer;

alert("回数制限リセットしました");

}


/* データ削除 */
async function resetVotes(){

if(!confirm("投票データを削除しますか？")) return;

await fetch(API + "?action=resetVotes");

alert("削除しました");

}

</script>

</body>
</html>
