<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投票結果</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0b1026;
color:white;
padding:20px;
}

/* ヘッダー */
h1{
text-align:center;
margin-bottom:20px;
}

/* セクション */
h2{
margin-top:30px;
border-left:4px solid #7ee0ff;
padding-left:10px;
}

/* 全画面ボタン */
.fullBtn{
position:fixed;
top:10px;
right:10px;
padding:10px 14px;
border:none;
border-radius:8px;
background:#7ee0ff;
color:#000;
font-weight:bold;
cursor:pointer;
z-index:999;
}

/* アイテム */
.item{
margin:12px 0;
transition: transform 0.6s ease, opacity 0.6s ease;
}

/* 行 */
.row{
display:flex;
justify-content:space-between;
margin-bottom:4px;
}

/* バー */
.bar-wrap{
width:100%;
height:10px;
background:rgba(255,255,255,0.1);
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#4fc3ff,#7ee0ff);
transition:width 0.8s ease;
}
</style>
</head>

<body>

<button class="fullBtn" onclick="goFull()">全画面</button>

<h1>投票結果</h1>

<div id="output">読み込み中...</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxj96B2mEf3HCNVW6pmKuXD31ShN-oYYe53RoAXwF_yg5H7IyoQfkobosDs4vIobo706Q/exec";

/* 🌙全画面 */
function goFull(){
const elem = document.documentElement;
if(elem.requestFullscreen){
elem.requestFullscreen();
}else if(elem.webkitRequestFullscreen){
elem.webkitRequestFullscreen();
}else if(elem.msRequestFullscreen){
elem.msRequestFullscreen();
}
}

/* ESCで解除 */
document.addEventListener("keydown",(e)=>{
if(e.key==="Escape"){
document.exitFullscreen();
}
});

/* 🌙描画関数 */
function renderSection(title, data){

const arr = Object.entries(data || {}).map(([name,count])=>({
name, count
}));

arr.sort((a,b)=>b.count - a.count);

let max = arr[0] ? arr[0].count : 1;

let html = `<h2>${title}</h2>`;

arr.forEach((item,i)=>{

const percent = (item.count / max) * 100;

html += `
<div class="item" id="${title}-${item.name}">
<div class="row">
<span>${i+1}. ${item.name}</span>
<span>${item.count}票</span>
</div>
<div class="bar-wrap">
<div class="bar" style="width:${percent}%"></div>
</div>
</div>
`;

});

return html;
}

/* 🌙読み込み */
function load(){

fetch(API)
.then(res=>res.json())
.then(data=>{

let html = "";

html += renderSection("クラス企画", data.class);
html += renderSection("部活動", data.club);

document.getElementById("output").innerHTML = html;

});

}

/* 初回 */
load();

/* 🌙リアルタイム更新 */
setInterval(load,5000);

</script>

</body>
</html>
