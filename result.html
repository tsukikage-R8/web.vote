<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投票結果</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0b1026;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

h2{
margin-top:30px;
border-left:4px solid #7ee0ff;
padding-left:10px;
}

.section{
margin-top:20px;
}

.card{
background:rgba(255,255,255,0.08);
padding:10px 14px;
margin:8px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}
</style>
</head>

<body>

<h1>投票結果</h1>

<div id="output">読み込み中...</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxj96B2mEf3HCNVW6pmKuXD31ShN-oYYe53RoAXwF_yg5H7IyoQfkobosDs4vIobo706Q/exec";

function load(){

fetch(API)
.then(res => res.json())
.then(data => {

let html = "";

/* 🌙クラス */
html += `<div class="section"><h2>クラス企画</h2>`;

if(data.class){
for(const key in data.class){
html += `
<div class="card">
<span>${key}</span>
<span>${data.class[key]}票</span>
</div>
`;
}
}

html += `</div>`;

/* 🌙運動部 */
html += `<div class="section"><h2>運動部</h2>`;

if(data.sports){
for(const key in data.sports){
html += `
<div class="card">
<span>${key}</span>
<span>${data.sports[key]}票</span>
</div>
`;
}
}

html += `</div>`;

/* 🌙文化部 */
html += `<div class="section"><h2>文化部</h2>`;

if(data.culture){
for(const key in data.culture){
html += `
<div class="card">
<span>${key}</span>
<span>${data.culture[key]}票</span>
</div>
`;
}
}

html += `</div>`;

/* 表示 */
document.getElementById("output").innerHTML = html;

})
.catch(err => {
document.getElementById("output").innerHTML =
"データ取得エラー：" + err;
});

}

/* 初回読み込み */
load();

/* 🌙リアルタイム更新（5秒ごと） */
setInterval(load, 5000);

</script>

</body>
</html>
