<!DOCTYPE html>
<html lang="ja">
<head>

}

.container{
width:90%;
max-width:500px;
text-align:center;
}

h1{

}

}

a.button{

padding:16px;
border-radius:14px;

backdrop-filter:blur(10px);

box-shadow:0 8px 20px rgba(0,0,0,0.2);

transition:.2s;
font-size:16px;
}

a.button:hover{
transform:translateY(-2px);
background:rgba(120,220,255,0.25);

</style>

</head>

<h1>Let's vote!</h1>

</a>

</a>
