<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>確認画面</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0b1026;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:420px;
background:rgba(255,255,255,0.08);
padding:24px;
border-radius:16px;
backdrop-filter:blur(10px);
text-align:center;
}

<div class="check">✓</div>
  
h1{
font-size:20px;
margin-bottom:20px;
}

.info{
margin:20px 0;
line-height:1.8;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.ok{
background:linear-gradient(90deg,#4fc3ff,#7ee0ff);
color:white;
}

.back{
background:rgba(255,255,255,0.2);
color:white;
}
</style>

</head>

<body>

<div class="container">

<h1>この内容で投票しますか？</h1>

<div class="info">
<div id="type"></div>
<div id="choice"></div>
</div>

<button class="ok" id="send">送信する</button>
<button class="back" onclick="history.back()">戻る</button>

</div>

<script>
// ----------------------
// URL取得
// ----------------------
const params = new URLSearchParams(location.search);
const type = params.get("type");
const choice = params.get("choice");

// ----------------------
// 表示用変換
// ----------------------
let typeText = "";

if(type === "class") typeText = "クラス企画";
if(type === "sports") typeText = "運動部";
if(type === "culture") typeText = "文化部";

// ----------------------
// 画面表示
// ----------------------
document.getElementById("type").innerText = "種類：" + typeText;
document.getElementById("choice").innerText = "投票先：" + choice;

// ----------------------
// 送信（仮：完了画面へ）
// ----------------------
document.getElementById("send").onclick = ()=>{
location.href = "thanks.html";
};
</script>

</body>
</html>
