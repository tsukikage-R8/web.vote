<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>確認画面</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0b1026;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:420px;
background:rgba(255,255,255,0.08);
padding:24px;
border-radius:16px;
text-align:center;
}

/* テキスト */
h2{
margin-bottom:10px;
}

p{
margin-bottom:20px;
opacity:0.9;
}

/* ボタン */
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#4fc3ff,#7ee0ff);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:active{
transform:scale(0.98);
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

/* =========================
   ローディング
========================= */
#loading{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.spinner{
width:50px;
height:50px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{ transform:rotate(360deg); }
}
</style>

</head>

<body>

<!-- ローディング -->
<div id="loading">
  <div class="spinner"></div>
</div>

<div class="container">

<h2 id="type">読み込み中...</h2>
<p id="choice">読み込み中...</p>

<button id="send">送信する</button>

</div>

<script>
window.addEventListener("DOMContentLoaded", () => {

const params = new URLSearchParams(location.search);
let type = params.get("type");
let choice = params.get("choice");

const typeEl = document.getElementById("type");
const choiceEl = document.getElementById("choice");
const sendBtn = document.getElementById("send");
const loading = document.getElementById("loading");

/* デフォルト */
if(!type) type = "class";

/* 表示変換 */
let typeText = "";
if(type === "class") typeText = "クラス企画";
if(type === "sports") typeText = "運動部";
if(type === "culture") typeText = "文化部";

typeEl.innerText = "種類：" + typeText;

/* QR対応 */
if(!choice){
choiceEl.innerText = "投票先：未選択（通常ルート）";
}else{
choiceEl.innerText = "投票先：" + choice;
}

/* 送信 */
sendBtn.onclick = async () => {

sendBtn.disabled = true;
loading.style.display = "flex";

try{

await fetch("https://script.google.com/macros/s/AKfycbz7dNbsj7XutVdKaTkehBIiC_LAHM2_QbEphy9jTkV5gTLJ3x8KGkRRyUUTYqKRgm5IXg/exec", {
method:"POST",
body: JSON.stringify({
type,
choice
})
});

setTimeout(() => {
location.href = "thanks.html";
}, 600);

}catch(e){

sendBtn.disabled = false;
loading.style.display = "none";
alert("送信に失敗しました");

}

};

});
</script>

</body>
</html>
