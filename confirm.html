<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>確認画面</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0b1026;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:420px;
background:rgba(255,255,255,0.08);
padding:24px;
border-radius:16px;
text-align:center;
}

h2{
margin-bottom:10px;
}

p{
margin-bottom:20px;
}

/* ボタン */
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#4fc3ff,#7ee0ff);
color:white;
font-weight:bold;
cursor:pointer;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

/* 🌙ローディング */
.spinner{
display:none;
margin:15px auto;
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid #7ee0ff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
</style>

</head>

<body>

<div class="container">

<h2 id="type">読み込み中...</h2>
<p id="choice">読み込み中...</p>

<!-- 🌙くるくる -->
<div class="spinner" id="spinner"></div>

<button id="send">送信する</button>

</div>

<script>
window.addEventListener("DOMContentLoaded", () => {

const params = new URLSearchParams(location.search);
let type = params.get("type");
let choice = params.get("choice");

const typeEl = document.getElementById("type");
const choiceEl = document.getElementById("choice");
const sendBtn = document.getElementById("send");
const spinner = document.getElementById("spinner");

// 🌙安全対策
if(!type){
type = "class";
}

let typeText = "";

if(type === "class") typeText = "クラス企画";
if(type === "sports") typeText = "運動部";
if(type === "culture") typeText = "文化部";

typeEl.innerText = "種類：" + typeText;

// 🌙QR対応
if(!choice){
choiceEl.innerText = "投票先：未選択（通常ルート）";
}else{
choiceEl.innerText = "投票先：" + choice;
}

sendBtn.onclick = () => {

// 二重送信防止
sendBtn.disabled = true;
spinner.style.display = "block";

fetch("https://script.google.com/macros/s/AKfycbz7dNbsj7XutVdKaTkehBIiC_LAHM2_QbEphy9jTkV5gTLJ3x8KGkRRyUUTYqKRgm5IXg/exec", {
method: "POST",
body: JSON.stringify({
type: type,
choice: choice
})
})
.then(() => {

// 少し演出
setTimeout(() => {
location.href = "thanks.html";
}, 600);

})
.catch(() => {

// 復帰
sendBtn.disabled = false;
spinner.style.display = "none";
alert("送信に失敗しました");

});

};

});
</script>

</body>
</html>
