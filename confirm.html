<script>
const params = new URLSearchParams(location.search);
const type = params.get("type");
const choice = params.get("choice");

let typeText = "";

if(type === "class") typeText = "クラス企画";
if(type === "sports") typeText = "運動部";
if(type === "culture") typeText = "文化部";

document.getElementById("type").innerText = "種類：" + typeText;
document.getElementById("choice").innerText = "投票先：" + choice;

// 👇ここが送信本体
document.getElementById("send").onclick = ()=>{

fetch("https://script.google.com/macros/s/AKfycbz7dNbsj7XutVdKaTkehBIiC_LAHM2_QbEphy9jTkV5gTLJ3x8KGkRRyUUTYqKRgm5IXg/exec", {
method:"POST",
body: JSON.stringify({
type: type,
choice: choice
})
})
.then(()=> {
location.href = "thanks.html";
})
.catch(()=>{
alert("送信に失敗しました");
});

};
</script>
